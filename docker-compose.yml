# For users: just pull and run (no source code needed)
services:
  youtube-scribe:
    image: ghcr.io/cosmicpush/youtube-scribe:latest
    ports:
      - "3000:3000"
    volumes:
      - scribe-data:/app/data
    environment:
      - DATA_DIR=/app/data
      - TZ=Asia/Kolkata
    restart: unless-stopped

volumes:
  scribe-data:
